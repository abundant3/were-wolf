<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>游戏设置</title>
    <link rel="stylesheet" href="/static/css/toastr.min.css">
    <link rel="stylesheet" href="/static/css/global.min.css">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <header class="header-banner">
        <span class="header-banner-title value-title">狼人杀</span>
        <span class="header-banner-value">游戏设置</span>
    </header>
    <div class="content-container">
        <div class="settings-panel">
            <section class="settings-section">
                <h2 class="settings-section-title">声音</h2>
                <div class="settings-row">
                    <span class="settings-row-label">背景音乐</span>
                    <div class="volume-control">
                        <input type="range" class="volume-slider" min="0" max="100" step="1" id="background-audio">
                        <span class="volume-value" id="background-audio-value">50</span>
                    </div>
                </div>
                <div class="settings-row">
                    <span class="settings-row-label">声音效果</span>
                    <div class="volume-control">
                        <input type="range" class="volume-slider" min="0" max="100" step="1" id="sound-effect-audio">
                        <span class="volume-value" id="sound-effect-audio-value">50</span>
                    </div>
                </div>
                <div class="settings-row">
                    <span class="settings-row-label">通知音效</span>
                    <div class="volume-control">
                        <input type="range" class="volume-slider" min="0" max="100" step="1" id="notification-audio">
                        <span class="volume-value" id="notification-audio-value">50</span>
                    </div>
                </div>
            </section>
            <section class="settings-section">
                <h2 class="settings-section-title">模型配置</h2>
                <div class="settings-row">
                    <span class="settings-row-label">端点地址</span>
                    <div class="endpoint-control">
                        <input id="endpoint-address" class="endpoint-input" type="text"
                            placeholder="https://api.openai.com/v1">
                        <button id="check-balance" class="endpoint-button">查询余额</button>
                    </div>
                </div>
                <div class="settings-row">
                    <span class="settings-row-label">端点密钥</span>
                    <div class="endpoint-control">
                        <input id="endpoint-key" class="endpoint-input" type="password" placeholder="请输入您的API密钥">
                        <button id="get-api-key" class="endpoint-button">获取密钥</button>
                    </div>
                </div>
                <div class="settings-row">
                    <span class="settings-row-label">默认模型</span>
                    <div class="endpoint-control">
                        <input id="default-model" class="endpoint-input" type="text" placeholder="请输入默认模型名称">
                        <button id="test-model" class="endpoint-button">测试模型</button>
                    </div>
                </div>
            </section>
        </div>
    </div>
    <footer class="footer-banner"></footer>
    <script src="/static/script/jquery.min.js"></script>
    <script src="/static/script/toastr.min.js"></script>
    <script src="/static/script/global.min.js"></script>
    <script src="index.js"></script>
</body>

</html>
